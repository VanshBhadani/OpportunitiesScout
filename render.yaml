# ─────────────────────────────────────────────────────────────────
# render.yaml — Infrastructure-as-Code for Render.com deployment
# This deploys the FastAPI backend as a Web Service.
# ─────────────────────────────────────────────────────────────────

services:
  - type: web
    name: opportunityscout-backend
    runtime: python
    region: singapore   # closest to India; change to oregon/frankfurt as needed
    plan: free

    # Build: install all Python deps from requirements.txt
    buildCommand: pip install -r requirements.txt

    # Start: run uvicorn pointing at the FastAPI app object
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    # Environment variables — set secret values in Render dashboard
    # Non-secret defaults can be listed here.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard (Supabase connection string)
      - key: NVIDIA_API_KEY
        sync: false          # Set in Render dashboard
      - key: ZHIPUAI_API_KEY
        sync: false          # Set in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false          # Set in Render dashboard
      - key: SMTP_PASS
        sync: false          # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL in Render dashboard
